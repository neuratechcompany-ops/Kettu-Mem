name: Kettu Mem CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv pip install ruff black --python $(which python)
      - name: Ruff lint
        run: ruff check src/
      - name: Black format check
        run: black --check src/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install and test
        run: |
          uv venv --python ${{ matrix.python-version }} .test-venv
          .test-venv/bin/pip install \
            fastapi uvicorn pydantic pydantic-settings structlog \
            prometheus-client psutil python-multipart numpy faiss-cpu tiktoken openai \
            sentence-transformers pytest pytest-cov
          .test-venv/bin/python -m pytest src/tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t kettu-mem:test .
      - name: Docker smoke
        run: |
          docker run -d --name kettu-test -p 18765:8765 kettu-mem:test
          sleep 5
          curl -fsS http://localhost:18765/health | grep ok
          curl -fsS http://localhost:18765/status
          docker stop kettu-test
