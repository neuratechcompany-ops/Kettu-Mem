name: Kettu Mem CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv pip install ruff black --python $(which python3)
      - name: Ruff lint
        run: ruff check src/
      - name: Black format check
        run: black --check src/

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }} .test-venv
      - name: Install deps
        run: |
          uv pip install --python .test-venv/bin/python \
            fastapi uvicorn pydantic pydantic-settings structlog \
            prometheus-client psutil python-multipart \
            numpy faiss-cpu tiktoken openai \
            pytest pytest-timeout
      - name: Run tests
        run: |
          .test-venv/bin/python -m pytest src/tests/ \
            -v --tb=short --durations=20 --timeout=120

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t kettu-mem:test .
      - name: Docker smoke
        timeout-minutes: 10
        run: |
          set -euo pipefail
          docker run -d --name kettu-test -p 18765:8765 kettu-mem:test
          # Wait for server startup (FAISS/Mem0 init can take 30-60s)
          for i in $(seq 1 45); do
            if docker logs kettu-test 2>/dev/null | grep -q "Uvicorn running\|Application startup"; then
              break
            fi
            sleep 2
          done
          # Now probe health
          for i in $(seq 1 15); do
            resp=$(curl -fsS http://localhost:18765/health 2>/dev/null || true)
            if echo "$resp" | grep -q '"status":"ok"'; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:18765/status | grep '"version":"0.3.1"'
          docker logs kettu-test
          docker stop kettu-test
