name: Kettu Mem CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Ruff lint
        run: |
          uvx ruff check src/api/server.py src/api/error_buffer.py src/memory/memory_manager.py \
            src/extractors/ingestion_filter.py \
            src/tests/test_concurrent_sessions.py src/tests/test_tool_output_regression.py
      - name: Black format check
        run: |
          uvx black --check src/api/server.py src/api/error_buffer.py src/memory/memory_manager.py \
            src/extractors/ingestion_filter.py \
            src/tests/test_concurrent_sessions.py src/tests/test_tool_output_regression.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv pip install --system fastapi uvicorn pydantic-settings structlog prometheus-client psutil python-multipart faiss-cpu numpy openai tiktoken pandas
          uv pip install --system pytest pytest-cov
      - name: Run tests with coverage
        run: python -m pytest src/tests/ -v --tb=short --cov=src --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t kettu-mem:test .
      - name: Smoke test
        run: |
          docker run -d --name kettu-test -p 18765:8765 kettu-mem:test
          sleep 5
          curl -s http://localhost:18765/health | grep ok
          docker stop kettu-test
