version: "3.9"

services:
  kettu-mem:
    build: .
    image: kettu-mem:0.2.0
    container_name: kettu-mem
    ports:
      - "8765:8765"
    volumes:
      - kettu-data:/data
      - ./kettu_mem.yaml:/app/kettu_mem.yaml:ro
    environment:
      - KETTU_MEM_DATA_DIR=/data
      - KETTU_MEM_HOST=0.0.0.0
      - KETTU_MEM_PORT=8765
      - KETTU_MEM_LOG_LEVEL=INFO
      - KETTU_MEM_LOG_FORMAT=json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  kettu-data:
    driver: local
